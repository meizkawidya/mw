<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    .mobile {
      display: none;
    }

    @media (max-width: 768px) {
      .desktop {
        display: none;
      }

      .mobile {
        display: block;
      }
    }
  </style>
</head>

<body>

  <img src="mw-desktop.png" class="desktop">
  <img src="mw-mobile.png" class="mobile">

</body>
</html>
