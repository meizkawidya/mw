<!DOCTYPE html>
<html lang="en">
<head>
<style>
  .mobile {
    display: none;
  }

  @media (max-width: 768px) {
    .desktop {
      display: none;
    }

    .mobile {
      display: block;
    }
  }

  img {
    width: 100%;
    height: auto;
  }
</style>
  body {
    margin: 0;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  img {
    max-width: 100%;
    height: auto;
    display: block;
  }
</style>
</head>

<body>
<img src="mw2-desktop.png" class="desktop">
<img src="mw2-mobile.png" class="mobile">
</body>
</html>
