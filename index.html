<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>meizkawidya</title>

  <!-- EB Garamond -->
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">

  <style>

    html,
    body {
      margin: 0;
      width: 100%;
      overflow-x: hidden;
      background: #f3f3f3;
    }

    body {
      overflow: hidden;
    }

    .page {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* DESKTOP COPY */
    .copy {
      position: absolute;

      top: 28px;
      left: 28px;

      width: 975px;

      font-family: Helvetica, Arial, sans-serif;
      font-size: 32px;
      line-height: 1.25;

      letter-spacing: 0em;
      text-transform: uppercase;

      color: black;

      z-index: 2;
    }

    /* DESKTOP LINKS */
    .links {
      position: absolute;

      top: 30px;
      right: 38px;

      display: flex;
      gap: 38px;

      align-items: center;

      z-index: 3;
    }

    .links a {
      font-family: 'EB Garamond', serif;

      font-size: 28px;
      line-height: 1;

      color: #0033cc;

      text-decoration: underline;
      text-transform: uppercase;

      display: block;
    }

    .links a:hover {
      opacity: 0.6;
    }

    /* INACTIVE INFO */
    .inactive-link {
      font-family: 'EB Garamond', serif;

      font-size: 28px;
      line-height: 1;

      color: #0033cc;

      text-decoration: underline;
      text-transform: uppercase;

      display: block;

      pointer-events: none;
    }

    /* DESKTOP IMAGE */
    .desktop-illustration {
      position: fixed;

      left: 0;
      bottom: 0;

      width: 100vw;
      height: 100vh;

      object-fit: contain;
      object-position: center bottom;

      z-index: 1;

      display: block;
    }

    /* MOBILE IMAGE HIDDEN ON DESKTOP */
    .mobile-illustration {
      display: none;
    }

    /* MOBILE */
    @media (max-width: 768px) {

      .copy {
        top: 18px;
        left: 18px;

        width: 61vw;

        font-size: 22px;
        line-height: 1.2;
        letter-spacing: 0em;
      }

      .links {
        top: 20px;
        right: 19px;

        gap: 10px;
      }

      .links a {
        font-size: 20px;
        line-height: 1;
      }

      .inactive-link {
        font-size: 20px;
        line-height: 1;
      }

      /* HIDE DESKTOP IMAGE */
      .desktop-illustration {
        display: none;
      }

      /* SHOW MOBILE IMAGE */
      .mobile-illustration {
        display: block;

        position: fixed;

        left: 0;
        bottom: 0;

        width: 100vw;
        height: 100vh;

        object-fit: contain;
        object-position: center bottom;

        z-index: 1;
      }

    }

  </style>
</head>

<body>

  <div class="page">

    <!-- COPYWRITING -->
    <div class="copy">
      MEIZKA IS CURRENTLY PACING / JUGGLING BETWEEN WORK & LIKE 6 OTHER HOBBIES (WHILST FIGHTING THE URGE TO LIE ON THE GRASS, WRITE POEMS, AND LISTEN TO THE BIRD SINGING) — BUT SHE KNOWS THE SITE AIN’T GONNA RUN FOR ITSELF... DROPPING SOOOOOOOONN! 👀
    </div>

    <!-- LINKS -->
    <div class="links">
      <a href="https://instagram.com/meizkawidya" target="_blank">INSTA</a>

      <span class="inactive-link">INFO</span>
    </div>

    <!-- DESKTOP ILLUSTRATION -->
    <img class="desktop-illustration" src="mw2-desktop.png" alt="illustration">

    <!-- MOBILE ILLUSTRATION -->
    <img class="mobile-illustration" src="mw2-mobile.png" alt="illustration">

  </div>

</body>

</html>
